{title:"单人旅途",tags:["ballad","folk","classic"],lyrics:`独自走在陌生的街头

我们曾经的约定

火车开往陌生的城市
窗外风景一闪而过
我带着耳机 听着我们的歌
跟着旋律轻轻和`},
{title:"在那不遥远的地方",tags:["pop","folk"],lyrics:`在那不遥远的地方

那是属于你的土壤
等着你去开掘宝藏

哪里会有小桥流水
哗啦啦的洗去尘灰
漂浮桃花蕊 它有多美
采一片换你真心相对

明月又能无缺几回

在那不遥远的地方
有我为你鼓掌
坚强是你一生的武装`}
]},
{id:"sugela2011",name:"苏格拉没有底",year:2011,emoji:"📚",color:"#e74c3c",desc:"第三张专辑，中国风巅峰",songs:[
{title:"想象之中",tags:["ballad","rband","classic"],lyrics:`想象之中 雨过了一道彩虹
升起了烟火 白色天空
想象之中 你还好吗
我在家里 想着你

想象之中 一切都与想象不同
雨过了天晴 没有彩虹
你走了以后 我学会了沉默
习惯了一个人 生活

想象之中 我以为我会很痛
却发现平静得像一阵风
想象之中 回忆变得模糊
只有你的轮廓 还清晰记得

想象之中 窗外下起了雨
我站在窗前 看着远方
想象之中 一切都会过去
包括你 包括我`},
{title:"河山大好",tags:["pop","folk","china"],lyrics:`最近有点血压高 血糖也不低
最亚健康状态 坐久了腿发软
电脑看久了脖子它也会酸也会酸
数字时代貌似把生活节奏加快
也让人变得行动迟缓

忙忙忙 忙出个什么所以然
地球离了谁它都照样公转自转
河山大好 出去走走
碧海蓝天吹吹风 心情大好

别窝在家当懒虫 河山大好
忙忙忙 忙出个什么所以然
叹叹叹 弹指一挥人生苦短
终点不明沿途风景要好好看

你可以隐隐期待 途中佳缘到来
保持浪漫心态 活着就不算坏`},
{title:"拆东墙",tags:["china","rock","classic"],lyrics:`公元六五九年 十九岁
他接他爹的班
考不取功名的后果是接手自家酒馆
又听说同乡谁已经赴京做上小官
他的梦 往来客谁能买单

代代叹世道难 人心乱
可又能怎么办
他女人的洞房 至今还未圆
他的郎情妾意 他已送走她去了江南

拆东墙 补西墙
到头来还是一场空
拆东墙 为了谁
还不是为了活下去

花开花谢 花开花谢
人生能有几回少年
东拆西拆 到最后
只留下一声叹息`},
{title:"医生",tags:["ballad","rband"],lyrics:`你说懂了爱不是浪漫
我的本分给你安全感
是他让你受了内伤
我努力恢复你健康

我也没那种庸俗的情结
可他还是在你心里边
偶尔梦中还窜到嘴边
其实我也能够了解
心碎一旦到过极限
用多少岁月 都愈合不完全

我是你无奈的选择
你只想跟一个好人
我为你戴上了戒指
你的笑也还算逼真

我是你无奈的选择
却不是多么爱的人
只怪他下手太残忍
改变你一生`},
{title:"微博控",tags:["pop","rband"],lyrics:`你的昵称实在够土很多人用过
Lucy不寂寞 Fancy有一坨
你的头像和你够像但不够诱惑
见过本尊的只有我

你关注的人里面有七个非常火
全部是男的 我也有点火
你最happy的时候 是刷新那一秒
我评论了一句 你第二天才回我

我是可以什么都不说
但不可以什么都不做
放下客户端立地成佛

你的微博 暴露了你的一切
你的心情 你的行踪
我都看在眼里
却不敢问你为什么`},
{title:"毁人不倦",tags:["rock","ballad"],lyrics:`几片 来自松岛的枫叶
堆叠 魅惑血红的感觉
少年 从这里开始新的体验
最后 造了孽

付钱 付到忏悔的境界
蜕变 洒下了一滩碎片
它毁人不倦

初夏的雨 催人长大
然后呢
然后是 各自走散

几片 来自松岛的枫叶
堆叠 魅惑血红的感觉
少年 从这里开始新的体验
最后 造了孽

一月 当半数生命终结
付钱 付到忏悔的境界
蜕变 洒下了一滩碎片
它毁人不倦`},
{title:"双人旁",tags:["rband","ballad"],lyrics:`当你坐在我身旁
梨花带雨的模样
电影情节有点伤
把你的柔弱释放

当我坐在你身旁
悬的手就会紧张
往哪儿放
值得再三思量

你提过的好地方
我标在地图上
等哪一天 我带你去躺在那屋顶上

双人旁 你的月光
双人旁 我会收藏
双人旁 偶尔会想
双人旁 当时太紧张

双人旁 你转播的歌好耳熟
双人旁 我们坐一起听过
双人旁 当日嫌它的唱法做作
双人旁 现在听起来很生动`},
{title:"降温",tags:["china","ballad"],lyrics:`11月20日0点 北京 小雨
心情：好平静

今天做了很多事情 回到家里有点烦心
接到她的电话 我都没有使用好的语气
Sorry 那不是我本意
也不知道我最近是怎么搞的

也许被，也许是那几通电话
让我有些不对和乱了

新闻里那场雨
淅沥沥下了三天
我也跟着流了三天泪
我想是不是我不够成熟
所以才看不清这个世界的浑浊

给你我的问候 但你不回
我站在门外 看着灯火通明
这场雨降温了天气
却冷了我的心`},
{title:"敬酒不吃",tags:["rock","rband"],lyrics:`有些人一吃饭就很喜欢敬酒
三杯酒下肚就能够唤你朋友
半醉不醉后他说出一个请求
就是……哈……啊……嗯……缓缓开口

想让我喝酒 要问真心够不够
令母毕生遗憾想必是儿子丑
看你不顺眼自然有它的理由
敬酒不吃 你们吃罚酒的爽

我一个人品尝 你心里定在骂我轻狂
但能把我怎样 身在高楼心在北大荒
我就这副死样 何必跟我装没用场

有些事情不是我不想
是我真的不屑
敬酒不吃 罚酒我也不喝
这就是我的态度`},
{title:"千百度",tags:["china","folk","classic"],lyrics:`关外野店 烟火绝 客怎眠
寒来袖间 谁为我 添两件
三四更雪 风不减 吹袭一夜
只是可怜 瘦马未得好歇

怅然入梦 梦几月 醒几年
往事凄艳 用情浅 两手缘
鹧鸪清怨 听得见 飞不回堂前
旧楹联红褪墨残谁来揭

我寻你千百度 日出到迟暮
一瓢江湖我沉浮
我寻你千百度 又一岁荣枯
可你从不在 灯火阑珊处`}
]},
{id:"mengyou2012",name:"梦游计",year:2012,emoji:"💭",color:"#9b59b6",desc:"第四张专辑，哲思之作",songs:[
{title:"胡萝卜须",tags:["rock","ballad"],lyrics:`胡萝卜须 抓住蟾蜍
在摇椅上 它说的对
大人把世界分了黑白
要你照着做 不要想太多

胡萝卜须 抓住蟾蜍
碾碎它 证明你长大
别哭 别哭 小朋友
这就是成长要付出的代价

他笑得多无奈
他哭得多大声
胡萝卜须 只是一道菜
为什么 需要那么多爱

大人们 总是说
这都是为了你好
胡萝卜须 流着泪
把蟾蜍喂给了猫`},
{title:"幻听",tags:["ballad","rband","classic"],lyrics:`在远方的时候
又想你到泪流
这矫情的措辞结构
经历过的人会懂
那些不堪言的疼痛
也就是我自作自受
你没有装聋
你真没感动

一个人的时候
偷偷看你的微博
你转播的歌好耳熟
我们坐一起听过
当日嫌它的唱法做作
现在听起来竟然很生动
可能是时光让耳朵变得宽容

如今一个人听歌总是会觉得失落
幻听你在我的耳边轻轻诉说
夜色多温柔
你有多爱我
如今一个人听歌总是会觉得难过
爱已不在这里我却还没走脱
列表里的歌
随过往流动`},
{title:"对话老师",tags:["pop","rap"],lyrics:`上课铃声响起 我走进教室
看见老师站在讲台上
手里拿着粉笔 眼睛看着我
仿佛在说 你又迟到了

老师啊老师 你也有过青春吧
你也曾经 为爱疯狂过吧
只是后来 你选择了安稳
把梦想 藏在了心底

什么才是人生的意义
你叫我们要听话
可你自己 听谁的话

岁月改变了你我
不变的是 那颗初心`},
{title:"伴虎",tags:["rock","china"],lyrics:`我们说好都不贪不想
这世界太多来去无常
如果可以给我三千丈
白发苍苍 纸泻轻狂 浓墨飞扬 阵亡

我们说好都不躲不藏
残舟已经乘破了巨浪
如果战斗成我的理想
万人敬仰 举世无双

来啊 来啊 来啊 谁赢谁输
来啊 来啊 谁在最后
伴君如伴虎 有多少人为此付出
到老来 才明白这道理

旧时王谢堂前燕 飞入寻常百姓家
荣华富贵一场空 何必太执着`},
{title:"闺蜜",tags:["ballad","rband"],lyrics:`你和她从小就熟
念书时每天放学都一起走
三十八度顶着烈日游泳
八卦莫文蔚和孙燕姿谁更瘦

毕业后你们还是好朋友
时不时的约她喝几杯酒
最头疼的烦恼全部都说
她是你最信任的闺蜜

可是有一天 你哭着告诉我
她抢走了你的男朋友
你们从此不再是闺蜜
变成了最熟悉的陌生人

这世间的感情 谁能说得清楚
也许是我太天真 也许是你太傻`},
{title:"装糊涂",tags:["pop","ballad"],lyrics:`除刺的玫瑰 安全又唯美
我踏实放在床头柜 醒来以后昏聩
脑袋非常疲惫 罪魁祸首是那香味
爱没有枯萎 只有点乏味

乏味撺掇着人出轨 我扛住了
可是你 让我措手不及
如果爱一个人 注定是要受苦
这第一课 进退维谷

对于你的谎话 我装糊涂
不想把你了解太清楚
装糊涂是极难的艺术
每个说谎的人 也许都有苦衷

就把痛埋在岁月之中
学会伪装 学会不在乎`},
{title:"Play With Style",tags:["pop","rband"],lyrics:`谈什么风格 论什么独特
说实话在我眼里全是
有的没的撒哈拉
名相的造作 心识的困惑
还有多少人尝试侧耳倾听
自己呼吸和脉搏

Show me show me show me
让我看看你的Style
Play with style 做你自己
不要被世界定义

跳什么风格 玩什么独特
这世界上太多规则
不如 我行我素
活出自己的一片天

打破框架 突破束缚
找到自己的态度
这就是 许嵩的风格`},
{title:"心疼你的过去",tags:["ballad","rband"],lyrics:`Baby 我看着你的眼睛
总是带着蓝色笑意
和你在一起就是非常开心的事情
好多人羡慕我 夸赞你的美丽

我模仿你的笑容 回报给他们官方的谢意
也苦笑我自己
你跟我聊前任 聊到哭红了眼睛
心疼你的过去 那些伤心的往事

你轻轻的安慰我 不要再回味过去的对错
要珍惜未来生活
我嘴上答应但心里还是很痛
心疼你的过去 谁作孽的悲剧

擦掉眼泪很容易 但却无法擦掉回忆
心疼你的过去 别怕流言蜚语
我会用余生 好好疼你`},
{title:"全球变冷",tags:["folk","ballad"],lyrics:`风在吹 吹什么 风在吹
吹散了落叶 吹不散寂寞
全球在变冷 人心在变冷
可我还在等 等一个温暖

看新闻说 今天哪里又出了事

如果我路过 会伸出援手吗

我想要 世界多点爱
可是自己却做不到
全球变冷 从我开始
也许能改变一点点

不要等到失去了 才懂得珍惜
不要等到冷漠了 才想起温暖`},
{title:"亲情式的爱情",tags:["ballad","folk","classic"],lyrics:`新月 湖畔 电影 西餐 那些夜晚
熟悉的桥段 冲动变平淡
上班 下班 买菜 做饭 最后洗碗

相爱的时候总笑谈 爱情多简单

亲情式的爱情 不浪漫但很温暖

]},
{id:"buru2014",name:"不如吃茶去",year:2014,emoji:"🍵",color:"#1abc9c",desc:"第五张专辑，禅意中国风",songs:[
{title:"等到烟火清凉",tags:["china","folk"],lyrics:`天干物燥 小心火烛

天干物燥 小心火烛

天干物燥

{title:"山水之间",tags:["china","folk","classic"],lyrics:`昨夜同门云集 推杯又换盏
今朝茶凉酒寒 豪言成笑谈
半生累 尽徒然 碑文完美有谁看

满树玉瓣多傲然 江南烟雨却痴缠
花飞雨追一如尘缘理还乱

落花雨 你飘摇的美丽
花香氤 把往日情勾起
我愿意 化浮萍躺湖心

锦服华裳一炬 粗袖如心宽
林中抚琴曲委婉 群山听懂我悲欢
泪如雨落才知过往剪不断`},
{title:"七夕",tags:["china","ballad"],lyrics:`江畔暮雨纷纷 夕阳西沉
津渡烛影深深 是我在等
你歌声犹绕耳 清风在侧
恍然发觉琴案已蒙尘

当日罗带轻分 缘定今生
时光一去如梭似你穿针
葵星未拜 禅院深深 尘封旧情
啊啊啊啊 啊啊啊啊

夜幕垂 鹊桥会 七夕的念想
皎月归 我轻随 烟火对影赏
你我在心中 是与非都无妨
情话无人讲 也就不用讲
且把浓情化作诗两行`},
{title:"有桃花",tags:["china","pop"],lyrics:`赏花赋月不是我本领
也不如人家有型阔气
好多朋友都劝我别再追随你
别做一条爱上沙漠的鱼

可我知道他们都不懂你

吹进我心中`},
{title:"惊鸿一面",tags:["china","ballad","classic"],lyrics:`翻手为云覆手为雨
金盆洗手止风雨
不恋红尘却难舍回忆
每一段都有你

年少初遇常在我心

江山如画又怎能比拟
你送我的风景

柳下闻瑶琴起舞和一曲
仿佛映当年翩若惊鸿影
谁三言两语撩拨了情意
谁一颦一笑摇曳了星云

纸扇藏伏笔玄机诗文里
紫烟燃心语留香候人寻
史书列豪杰功过有几许
老庄是老庄 社会是社会`},
{title:"隐隐约约",tags:["china","folk"],lyrics:`枕边 如此隐隐约约
发香绵延 好似江水连天
指尖 如此隐隐约约
肩上红线 忽明忽暗的坠跌

坠跌 坠跌
许愿 如此隐隐约约
落款未签 日出之后变脸
有眼 如此隐隐约约
记录所有 你的笑与泪

隐隐约约 是你的声音

function renderAlbums(){const nav=document.getElementById("album-nav");albums.forEach((a,i)=>{const div=document.createElement("div");div.className="album-item";div.innerHTML=`<span class="album-emoji">${a.emoji}</span><span class="album-name">${a.name}</span><span class="album-year">${a.year}</span>`;div.onclick=()=>filterByAlbum(a.id);nav.appendChild(div)})}
function filterByAlbum(id){document.querySelectorAll(".album-item").forEach(el=>el.classList.remove("active"));if(id){document.querySelector(`.album-item:nth-child(${albums.findIndex(a=>a.id===id)+1})`).classList.add("active");renderSongs(id)}else{renderSongs()}}
function filterByTag(tag){document.querySelectorAll(".filter-btn").forEach(btn=>{btn.classList.toggle("active",btn.dataset.filter===tag)});const activeAlbum=document.querySelector(".album-item.active");const albumId=activeAlbum?albums.find(a=>a.name===activeAlbum.querySelector(".album-name").textContent)?.id:null;renderSongs("all",tag)}
function renderSongs(albumId="all",tag="all"){const grid=document.getElementById("song-grid");grid.innerHTML="";let songs=[];albums.forEach(a=>{if(albumId==="all"||a.id===albumId)songs=songs.concat(a.songs.map(s=>({...s,album:a.name,albumId:a.id})))});if(tag!=="all")songs=songs.filter(s=>s.tags.includes(tag));document.getElementById("count").textContent=songs.length;songs.forEach(s=>{const card=document.createElement("div");card.className="song-card";card.innerHTML=`<div class="card-album"><span>${s.album}</span></div><div class="card-title">${s.title}</div><div class="card-tags">${s.tags.map(t=>`<span class="tag">${tagNames[t]||t}</span>`).join("")}</div>`;card.onclick=()=>openLyrics(s);grid.appendChild(card)})}
function openLyrics(song){document.getElementById("modal-title").textContent=song.title;document.getElementById("modal-meta").textContent=song.album;document.getElementById("modal-tags").innerHTML=song.tags.map(t=>`<span class="modal-tag">${tagNames[t]||t}</span>`).join("");document.getElementById("modal-lyrics-text").textContent=song.lyrics;const af=audioMap[song.title];const pl=document.getElementById("modal-player");const au=document.getElementById("modal-audio");if(af){au.src="./许嵩/"+af;pl.style.display="block"}else{au.src="";pl.style.display="none"}document.getElementById("lyrics-modal").style.display="flex"}
function closeLyrics(){const au=document.getElementById("modal-audio");au.pause();au.src="";document.getElementById("lyrics-modal").style.display="none"}
document.querySelectorAll(".filter-btn").forEach(btn=>{btn.onclick=()=>filterByTag(btn.dataset.filter)});
window.onscroll=()=>{document.getElementById("back-top").style.display=window.scrollY>300?"block":"none"};
renderAlbums();renderSongs();
</script>
