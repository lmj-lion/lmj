<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金曲獎音樂世界 2000–2025</title>
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #F5D97E;
  --gold-dark: #8B6914;
  --bg-dark: #0D0D0D;
  --bg-card: #1A1A1A;
  --text: #F0E6C8;
  --text-muted: #A89060;
  --accent: #E8B84B;
  --border: #3A2E14;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Serif TC', 'Noto Serif SC', Georgia, serif;
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
}

/* ===== HERO ===== */
.hero {
  background: linear-gradient(135deg, #0D0D0D 0%, #1A1200 50%, #0D0D0D 100%);
  padding: 50px 20px 36px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.hero-trophy {
  font-size: 48px;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 20px rgba(201,168,76,0.6));
  animation: glow 2.5s ease-in-out infinite alternate;
}
@keyframes glow {
  from { filter: drop-shadow(0 0 10px rgba(201,168,76,0.4)); }
  to   { filter: drop-shadow(0 0 30px rgba(201,168,76,0.9)); }
}
.hero h1 {
  font-size: clamp(26px, 5vw, 48px);
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 4px;
  margin-bottom: 8px;
}
.hero-sub {
  color: var(--text-muted);
  font-size: 14px;
  letter-spacing: 2px;
}
.hero-stats {
  display: flex;
  gap: 36px;
  justify-content: center;
  margin-top: 24px;
  flex-wrap: wrap;
}
.hero-stat { text-align: center; }
.hero-stat .num { font-size: 26px; font-weight: 900; color: var(--gold); }
.hero-stat .label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* ===== FILTER BAR ===== */
.filter-bar {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.filter-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 5px 12px;
  border-radius: 18px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  transition: all 0.2s;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--gold); color: var(--gold); }
.filter-btn.active {
  background: var(--gold);
  border-color: var(--gold);
  color: #000;
  font-weight: 700;
}
.search-input {
  background: var(--bg-dark);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 14px;
  border-radius: 18px;
  font-size: 12px;
  font-family: inherit;
  outline: none;
  width: 160px;
  transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: var(--gold); }

/* ===== NOTE BANNER ===== */
.note-banner {
  background: rgba(139,105,20,0.1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 20px;
  margin: 24px auto;
  max-width: 900px;
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.7;
}
.note-banner strong { color: var(--gold); }

/* ===== MAIN ===== */
main { max-width: 1200px; margin: 0 auto; padding: 24px 16px 60px; }

/* ===== TIMELINE ===== */
.timeline-year {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 40px;
}
.year-badge {
  flex-shrink: 0;
  width: 70px;
  text-align: center;
}
.year-num {
  font-size: 20px;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
}
.year-届 {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 3px;
}
.year-line {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
.year-dot {
  width: 12px;
  height: 12px;
  background: var(--gold);
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(201,168,76,0.5);
  flex-shrink: 0;
  margin-top: 6px;
}
.year-dot.no-award {
  background: var(--text-muted);
  box-shadow: none;
  opacity: 0.5;
}
.year-vline {
  width: 2px;
  flex: 1;
  background: linear-gradient(to bottom, var(--gold-dark), transparent);
  min-height: 30px;
}
.song-card-wrap { flex: 1; }

/* ===== SONG CARD ===== */
.song-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: all 0.25s;
  cursor: pointer;
}
.song-card:hover {
  border-color: var(--gold);
  box-shadow: 0 4px 24px rgba(201,168,76,0.12);
  transform: translateY(-2px);
}
.song-card-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 20px;
}
.song-avatar {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.song-avatar.no-award {
  background: linear-gradient(135deg, #333, #555);
}
.song-info { flex: 1; min-width: 0; }
.song-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--gold-light);
  margin-bottom: 3px;
}
.song-artist {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 5px;
}
.song-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.tag {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 10px;
  border: 1px solid;
}
.tag-award { border-color: var(--gold-dark); color: var(--gold); background: rgba(201,168,76,0.08); }
.tag-lyricist { border-color: #2E5A3A; color: #7EC99A; background: rgba(126,201,154,0.08); }
.tag-note { border-color: #5A3A2E; color: #C99A7E; background: rgba(201,154,126,0.08); }
.expand-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 30px;
  height: 30px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.expand-btn:hover { border-color: var(--gold); color: var(--gold); }
.expand-btn.disabled { opacity: 0.3; pointer-events: none; }

.song-details {
  border-top: 1px solid var(--border);
  display: none;
  animation: slideDown 0.3s ease;
}
.song-details.open { display: block; }
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.detail-section {
  padding: 18px 20px;
}
.detail-label {
  font-size: 10px;
  color: var(--gold-dark);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
  font-weight: 700;
}
.detail-text {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.8;
}
.lyrics-block {
  white-space: pre-line;
  font-size: 14px;
  color: var(--text);
  line-height: 2;
  background: rgba(0,0,0,0.2);
  padding: 14px 16px;
  border-radius: 8px;
  border-left: 3px solid var(--gold-dark);
  margin-top: 10px;
  max-height: 600px;
  overflow-y: auto;
}
.lyrics-block::-webkit-scrollbar { width: 4px; }
.lyrics-block::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }

/* ===== EMPTY ===== */
.empty { text-align: center; padding: 60px; color: var(--text-muted); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }

/* ===== BACK TO TOP ===== */
.back-top {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 44px;
  height: 44px;
  background: var(--gold);
  color: #000;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  font-size: 20px;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
  box-shadow: 0 2px 12px rgba(201,168,76,0.4);
  transition: transform 0.2s;
}
.back-top:hover { transform: scale(1.1); }
.back-top.show { display: flex; }

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 28px;
  color: var(--text-muted);
  font-size: 12px;
  border-top: 1px solid var(--border);
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  .timeline-year { gap: 12px; }
  .year-badge { width: 52px; }
  .year-num { font-size: 16px; }
  .song-card-header { padding: 14px 14px; gap: 10px; }
  .song-title { font-size: 16px; }
  .hero { padding: 36px 16px 28px; }
  .detail-section { padding: 14px 14px; }
  .filter-bar { padding: 10px 10px; gap: 5px; }
  .filter-btn { padding: 4px 9px; font-size: 11px; }
}
</style>
</head>

    lyricist: "—",
    award: "年度歌曲獎暫停",
    emoji: "🎤",
    note: true,
    intro: `第11屆金曲獎（2000年），最佳年度歌曲獎處於暫停期。本屆最佳國語男演唱人由陳建年以《海洋》獲獎，最佳國語女演唱人由楊乃文以《Silence》獲獎。陳建年的《鄉愁》是其代表作之一，展現原住民音樂的純粹力量。`,

    emoji: "🎤",

    lyrics: `（心酸的浪漫）
作詞：那英／作曲：潘協慶
演唱：那英

我以為我可以 愛的簡簡單單

const years = [];
for (let y = 2000; y <= 2025; y++) years.push(String(y));

let currentYear = 'all';
let currentSearch = '';

function buildFilterBar() {
  const bar = document.getElementById('filterBar');
  let html = `<button class="filter-btn ${currentYear==='all'?'active':''}" onclick="filterYear('all')">全部</button>`;
  years.forEach(y => {
    html += `<button class="filter-btn ${currentYear===y?'active':''}" onclick="filterYear('${y}')">${y}</button>`;
  });
  html += `<input class="search-input" type="text" placeholder="🔍 搜尋歌曲 / 歌手" oninput="searchSongs(this.value)">`;
  bar.innerHTML = html;
}

function render() {
  const container = document.getElementById('main-content');
  const banner = document.getElementById('noteBanner');
  let data = SONGS;

  if (currentYear !== 'all') {
    data = data.filter(s => String(s.year) === currentYear);
    banner.style.display = 'none';
  } else {
    banner.style.display = data.some(s => s.note) ? 'block' : 'none';
  }
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    data = data.filter(s =>
      s.title.toLowerCase().includes(q) ||
      s.artist.toLowerCase().includes(q) ||
      s.lyricist.toLowerCase().includes(q)
    );
  }

  if (data.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🎵</div><p>找不到相關歌曲</p></div>`;
    return;
  }

  container.innerHTML = data.map((s, i) => {
    const isNote = s.note;
    return `
    <div class="timeline-year" data-year="${s.year}">
      <div class="year-badge">
        <div class="year-num">${s.year}</div>
        <div class="year-届">第${s.session}屆</div>
      </div>
      <div class="year-line">
        <div class="year-dot ${isNote?'no-award':''}"></div>
        <div class="year-vline"></div>
      </div>
      <div class="song-card-wrap">
        <div class="song-card">
          <div class="song-card-header">
            <div class="song-avatar ${isNote?'no-award':''}">${s.emoji}</div>
            <div class="song-info">
              <div class="song-title">《${s.title}》</div>
              <div class="song-artist">🎤 ${s.artist}</div>
              <div class="song-tags">
                <span class="tag ${isNote?'tag-note':'tag-award'}">🏆 ${s.award}</span>
                ${s.lyricist !== '—' ? `<span class="tag tag-lyricist">✍️ 詞：${s.lyricist}</span>` : ''}
              </div>
            </div>
            <button class="expand-btn" onclick="toggleCard(this)" title="展開歌詞">＋</button>
          </div>
          <div class="song-details">
            <div class="detail-section">
              <div class="detail-label">📖 歌曲簡介</div>
              <div class="detail-text">${s.intro}</div>
            </div>
            <div class="detail-section" style="border-top:1px solid var(--border)">
              <div class="detail-label">🎼 完整歌詞</div>
              <div class="lyrics-block">${s.lyrics}</div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(btn) {
  const card = btn.closest('.song-card');
  const details = card.querySelector('.song-details');
  const isOpen = details.classList.contains('open');
  details.classList.toggle('open');
  btn.textContent = isOpen ? '＋' : '－';
}

function filterYear(year) {
  currentYear = year;
  buildFilterBar();
  render();
  if (year !== 'all') {
    const el = document.querySelector(`.timeline-year[data-year="${year}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function searchSongs(val) {
  currentSearch = val.trim();
  render();
}

// Back to top
window.addEventListener('scroll', () => {
  document.getElementById('backTop').classList.toggle('show', window.scrollY > 400);
});

buildFilterBar();
render();
</script>
