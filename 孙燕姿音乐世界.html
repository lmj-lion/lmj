// stats
let totalSongs=0;
albums.forEach(a=>totalSongs+=a.songs.length);
document.getElementById('stat-songs').textContent=totalSongs;

// render sidebar
const navEl=document.getElementById('album-nav');
albums.forEach((a,i)=>{
  const btn=document.createElement('button');
  btn.className='album-nav-item';
  btn.innerHTML=a.emoji+' '+a.name+' <span class="album-year">'+a.year+'</span>';
  btn.onclick=()=>{document.getElementById('album-'+a.id)?.scrollIntoView({behavior:'smooth',block:'start'});document.querySelectorAll('.album-nav-item').forEach(b=>b.classList.remove('active'));btn.classList.add('active');};
  navEl.appendChild(btn);
});

// render songs
const grid=document.getElementById('song-grid');
let songIdx=0;
albums.forEach(a=>{
  const sec=document.createElement('div');
  sec.className='album-section';
  sec.id='album-'+a.id;
  sec.innerHTML=`<div class="album-header"><div class="album-cover-placeholder" style="background:${a.color}22;color:${a.color}">${a.emoji}</div><div class="album-info"><h2>${a.name}</h2><p>${a.year} · ${a.desc}</p></div><span class="song-count-badge">${a.songs.length}首</span></div>`;
  grid.appendChild(sec);

  a.songs.forEach(s=>{
    songIdx++;
    const card=document.createElement('div');
    card.className='song-card';
    card.dataset.tags=s.tags.join(',');
    card.dataset.album=a.name;
    card.dataset.year=a.year;
    card.dataset.lyrics=s.lyrics.toLowerCase();
    card.dataset.title=s.title;
    card.innerHTML=`<div class="song-num">#${String(songIdx).padStart(3,'0')}</div><div class="song-title">${s.title}</div><div class="song-album-name">${a.emoji} ${a.name} · ${a.year}</div><div class="song-tags">${s.tags.map(t=>'<span class="tag tag-'+t+'">'+'</span>').join('')}</div>`;
    card.onclick=()=>openLyrics(s,a);
    grid.appendChild(card);
  });
});

function openLyrics(song,album){
  document.getElementById('modal-title').textContent=song.title;
  document.getElementById('modal-meta').textContent=album.emoji+' '+album.name+' · '+album.year;
  document.getElementById('modal-tags').innerHTML=song.tags.map(t=>'<span class="tag tag-'+t+'">'+'</span>').join('');
  document.getElementById('modal-lyrics-text').textContent=song.lyrics;
  document.getElementById('lyrics-modal').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeLyrics(){
  document.getElementById('lyrics-modal').classList.remove('show');
  document.body.style.overflow='';
}

// filter
document.getElementById('filter-row').addEventListener('click',e=>{
  if(!e.target.classList.contains('filter-btn'))return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  const f=e.target.dataset.filter;
  document.querySelectorAll('.song-card').forEach(c=>{
    if(f==='all'||c.dataset.tags.includes(f))c.style.display='';
    else c.style.display='none';
  });
});

// search
document.getElementById('search-input').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();
  document.querySelectorAll('.song-card').forEach(c=>{
    if(!q){c.style.display='';return;}
    const match=c.dataset.title.toLowerCase().includes(q)||c.dataset.lyrics.includes(q)||c.dataset.album.toLowerCase().includes(q);
    c.style.display=match?'':'none';
  });
  // reset filter
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
});

// back to top
window.addEventListener('scroll',()=>{
  document.getElementById('back-top').classList.toggle('show',window.scrollY>400);
});
</script>
