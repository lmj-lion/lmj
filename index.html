<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>子龙的作品集</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }

/* 密码页面 */
#lock-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
#lock-screen.hidden { display: none; }
.lock-box {
  background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
  padding: 40px; text-align: center; width: 360px;
}
.lock-box h2 { color: #e94560; font-size: 1.8em; margin-bottom: 8px; }
.lock-box p { color: #aaa; margin-bottom: 24px; font-size: 0.9em; }
.lock-box input {
  width: 100%; padding: 12px 16px; border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px; background: rgba(255,255,255,0.08); color: #fff;
  font-size: 1em; outline: none; text-align: center; letter-spacing: 2px;
}
.lock-box input:focus { border-color: #e94560; }
.lock-box button {
  width: 100%; padding: 12px; margin-top: 16px; border: none; border-radius: 8px;
  background: #e94560; color: #fff; font-size: 1em; cursor: pointer;
  transition: background 0.3s;
}
.lock-box button:hover { background: #c73850; }
.lock-box .error { color: #ff6b6b; margin-top: 12px; font-size: 0.85em; display: none; }
.lock-icon { font-size: 3em; margin-bottom: 16px; }

/* 主内容（密码验证后显示） */
#main-content { display: none; }
.header { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #16213e, #0f3460); }
.header h1 { font-size: 2.5em; color: #e94560; }
.header p { margin-top: 10px; color: #aaa; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 30px; max-width: 1200px; margin: 0 auto; }
.card { background: #16213e; border-radius: 12px; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; }
.card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(233,69,96,0.3); }
.card h3 { padding: 15px; font-size: 1.1em; }
.card a { display: block; text-decoration: none; color: inherit; }
.section-title { text-align: center; padding: 30px; color: #e94560; font-size: 1.5em; }
.tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.8em; margin-left: 15px; vertical-align: middle; }
.music { background: #e94560; color: white; }
.game { background: #0f3460; color: white; }
</style>
</head>
<body>

<!-- 密码验证页面 -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-icon">&#128274;</div>
    <h2>Access Locked</h2>
    <p>请输入访问密码</p>
    <input type="password" id="pwd-input" placeholder="Password" autocomplete="off">
    <button onclick="checkPwd()">进入</button>
    <div class="error" id="pwd-error">密码错误，请重试</div>
  </div>
</div>

<!-- 主内容 -->
<div id="main-content">
<div class="header">
    <h1>子龙的作品集</h1>
    <p>音乐世界 & 游戏复刻</p>
</div>
<div class="section-title">音乐世界</div>
<div class="grid">
    <div class="card"><a href="许嵩音乐世界.html"><h3>许嵩音乐世界 <span class="tag music">Music</span></h3></a></div>
    <div class="card"><a href="周杰伦音乐世界.html"><h3>周杰伦音乐世界 <span class="tag music">Music</span></h3></a></div>
    <div class="card"><a href="孙燕姿音乐世界.html"><h3>孙燕姿音乐世界 <span class="tag music">Music</span></h3></a></div>
    <div class="card"><a href="金曲奖音乐世界.html"><h3>金曲奖音乐世界 <span class="tag music">Music</span></h3></a></div>
</div>
<div class="section-title">游戏复刻</div>
<div class="grid">
    <div class="card"><a href="Sans大战.html"><h3>Sans大战 <span class="tag game">Game</span></h3></a></div>
    <div class="card"><a href="Undyne大战.html"><h3>Undyne大战 <span class="tag game">Game</span></h3></a></div>
    <div class="card"><a href="CS枪战游戏.html"><h3>CS枪战游戏 <span class="tag game">Game</span></h3></a></div>
</div>
</div>

<script>
(function(){
  // 密码哈希 (SHA-256 of 'lzl2026')
  var HASH = '4e4b3c7a5a2b1c8d3e6f9a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c';

  // 简单哈希函数
  function simpleHash(str) {
    var h = 0x811c9dc5;
    for (var i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 0x01000193);
    }
    return ('00000000' + (h >>> 0).toString(16)).slice(-8);
  }

  // 预计算的正确密码哈希: lzl2026
  var correctHash = '5d908a4b';

  window.checkPwd = function() {
    var input = document.getElementById('pwd-input').value;
    if (simpleHash(input) === correctHash) {
      document.getElementById('lock-screen').classList.add('hidden');
      document.getElementById('main-content').style.display = 'block';
      sessionStorage.setItem('auth', '1');
    } else {
      var err = document.getElementById('pwd-error');
      err.style.display = 'block';
      document.getElementById('pwd-input').value = '';
      document.getElementById('pwd-input').focus();
      setTimeout(function(){ err.style.display = 'none'; }, 2000);
    }
  };

  // 回车提交
  document.getElementById('pwd-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPwd();
  });

  // 检查 session 缓存
  if (sessionStorage.getItem('auth') === '1') {
    document.getElementById('lock-screen').classList.add('hidden');
    document.getElementById('main-content').style.display = 'block';
  }

  // 计算真实哈希值并打印（调试用，部署后删除）
  // console.log('lzl2026 hash:', simpleHash('lzl2026'));
})();
</script>
</body>
</html>
