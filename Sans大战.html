// ========== Web Audio API 音效系统 ==========
const AudioCtx=new (window.AudioContext||window.webkitAudioContext)();
let sfxEnabled=true;
function playSFX(type){
  if(!sfxEnabled)return;
  const now=AudioCtx.currentTime;
  if(type==='type'){
    // 打字音效：短促方波
    const o=AudioCtx.createOscillator();
    const g=AudioCtx.createGain();
    o.type='square';
    o.frequency.setValueAtTime(900,now);
    o.frequency.exponentialRampToValueAtTime(600,now+0.04);
    g.gain.setValueAtTime(0.08,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.04);
    o.connect(g);g.connect(AudioCtx.destination);
    o.start(now);o.stop(now+0.05);
  }else if(type==='blaster'){
    // 龙骨炮发射：锯齿波扫频+噪声
    const o=AudioCtx.createOscillator();
    const g=AudioCtx.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(200,now);
    o.frequency.exponentialRampToValueAtTime(80,now+0.3);
    g.gain.setValueAtTime(0.2,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
    o.connect(g);g.connect(AudioCtx.destination);
    o.start(now);o.stop(now+0.35);
    // 噪声层
    const bufSize=AudioCtx.sampleRate*0.3;
    const buf=AudioCtx.createBuffer(1,bufSize,AudioCtx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++)data[i]=Math.random()*2-1;
    const n=AudioCtx.createBufferSource();
    const ng=AudioCtx.createGain();
    n.buffer=buf;
    ng.gain.setValueAtTime(0.1,now);
    ng.gain.exponentialRampToValueAtTime(0.001,now+0.3);
    n.connect(ng);ng.connect(AudioCtx.destination);
    n.start(now);n.stop(now+0.3);
  }else if(type==='hit'){
    // 受伤：短促噪声爆发
    const bufSize=AudioCtx.sampleRate*0.15;
    const buf=AudioCtx.createBuffer(1,bufSize,AudioCtx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++)data[i]=(Math.random()*2-1)*Math.pow(1-i/bufSize,2);
    const n=AudioCtx.createBufferSource();
    const g=AudioCtx.createGain();
    n.buffer=buf;
    g.gain.setValueAtTime(0.25,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
    n.connect(g);g.connect(AudioCtx.destination);
    n.start(now);n.stop(now+0.15);
    // 低频冲击
    const o=AudioCtx.createOscillator();
    const og=AudioCtx.createGain();
    o.type='square';
    o.frequency.setValueAtTime(150,now);
    o.frequency.exponentialRampToValueAtTime(40,now+0.1);
    og.gain.setValueAtTime(0.15,now);
    og.gain.exponentialRampToValueAtTime(0.001,now+0.12);
    o.connect(og);og.connect(AudioCtx.destination);
    o.start(now);o.stop(now+0.12);
  }else if(type==='bone'){
    // 骨头出现：轻微"嗖"声
    const o=AudioCtx.createOscillator();
    const g=AudioCtx.createGain();
    o.type='triangle';
    o.frequency.setValueAtTime(600,now);
    o.frequency.exponentialRampToValueAtTime(300,now+0.08);
    g.gain.setValueAtTime(0.06,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+0.1);
    o.connect(g);g.connect(AudioCtx.destination);
    o.start(now);o.stop(now+0.1);
  }
}

let frame=0, turn=0, waveTime=0;

// 绘制像素精灵（通用函数）
function drawPixelSprite(cx,cy,pixels,scale,flipX){
  ctx.save();ctx.translate(cx,cy);
  if(flipX)ctx.scale(-1,1);
  ctx.fillStyle=C.WHITE;
  pixels.forEach((row,y)=>{
    row.forEach(seg=>{
      ctx.fillRect(seg[0]*scale,y*scale,(seg[1]-seg[0]+1)*scale,scale);
    });
  });
  ctx.restore();
}

// Sans Idle 姿势（带眨眼动画）
function drawSansIdle(cx,cy,isBlink){
  drawPixelSprite(cx,cy,SANS_PIXELS,1,false);
  drawSansFace(cx,cy,isBlink,false,false);
}

// Sans Shrug 姿势（摊手/挥手 - 从截图1:1提取）
function drawSansShrug(cx,cy,isBlink){
  // 使用从frame_000570提取的挥手像素精灵
  // SANS_WAVE_PIXELS尺寸91x115，需要调整偏移使其与idle对齐
  const OFFSET_X=12, OFFSET_Y=20;
  ctx.save();ctx.translate(cx,cy);
  ctx.fillStyle=C.WHITE;
  SANS_WAVE_PIXELS.forEach((row,y)=>{
    row.forEach(seg=>{
      ctx.fillRect(seg[0]+OFFSET_X,y+OFFSET_Y,seg[1]-seg[0]+1,1);
    });
  });
  ctx.restore();
  // 挥手姿势的眼睛：根据状态绘制
  if(isBlink){
    ctx.fillStyle=C.BLACK;
    ctx.fillRect(cx+18,cy-2,10,3);
    ctx.fillRect(cx+32,cy-2,10,3);
  }else{
    ctx.fillStyle=C.BLACK;
    ctx.fillRect(cx+18,cy-4,10,8);
    ctx.fillRect(cx+32,cy-4,10,8);
  }
  // 嘴巴
  ctx.fillStyle=C.BLACK;
  ctx.fillRect(cx+24,cy+8,16,3);
}

// Sans Serious 姿势（战斗认真 - 左眼发光）
function drawSansSerious(cx,cy,isBlink){
  drawPixelSprite(cx,cy,SANS_PIXELS,1,false);
  drawSansFace(cx,cy,false,true,false);
  // 左侧龙骨炮头（第二形态标志性装饰）
  ctx.save();
  ctx.translate(cx-45,cy+15);
  ctx.scale(0.45,0.45);
  ctx.fillStyle=C.WHITE;
  BLASTER_PIXELS.forEach((row,y)=>{row.forEach(seg=>{ctx.fillRect(seg[0],y-107,seg[1]-seg[0]+1,1);});});
  ctx.restore();
}

// Sans Tired 姿势（后期疲惫 - 流汗）
function drawSansTired(cx,cy,isBlink){
  drawPixelSprite(cx,cy,SANS_PIXELS,1,false);
  drawSansFace(cx,cy,false,false,true);
  // 汗珠
  ctx.fillStyle=C.BLUE;
  ctx.fillRect(cx+35,cy+8,3,4);
  ctx.fillRect(cx+33,cy+14,2,3);
}

// 绘制Sans面部表情
function drawSansFace(cx,cy,isBlink,glowingEye,isTired){
  ctx.save();
  if(isBlink){
    // 闭眼 = 两条横线
    ctx.fillStyle=C.BLACK;
    ctx.fillRect(cx+6,cy-22,10,3);
    ctx.fillRect(cx+20,cy-22,10,3);
  }else if(glowingEye){
    // 左眼发光（黄色）
    ctx.fillStyle=C.BLACK;
    ctx.fillRect(cx+6,cy-24,10,8);
    ctx.fillRect(cx+20,cy-24,10,8);
    ctx.fillStyle=C.YELLOW;
    ctx.fillRect(cx+18,cy-25,8,10);
  }else{
    // 正常眼睛（黑色方块）
    ctx.fillStyle=C.BLACK;
    ctx.fillRect(cx+6,cy-24,10,8);
    ctx.fillRect(cx+20,cy-24,10,8);
  }
  // 嘴巴
  ctx.fillStyle=C.BLACK;
  if(isTired){
    ctx.fillRect(cx+12,cy-10,12,2);
  }else{
    ctx.fillRect(cx+10,cy-12,16,3);
    ctx.fillRect(cx+12,cy-9,12,2);
  }
  ctx.restore();
}

function drawSans(px,py){
  // 呼吸动画：轻微上下浮动
  const breathe=Math.sin(frame*0.05)*1.5;
  // 眨眼判断
  const isBlink=sans.blinkTimer<8;
  
  // 闪避动画：快速左右抖动 + 残影
  if(dodgeTimer>0){
    const dodgeOffset=Math.sin(frame*0.8)*25;
    // 残影（半透明）
    ctx.save();
    ctx.globalAlpha=0.35;
    if(sans.pose==='idle')drawSansIdle(px-dodgeOffset*0.6,py+breathe,isBlink);
    else if(sans.pose==='shrug')drawSansShrug(px-dodgeOffset*0.6,py+breathe,isBlink);
    else if(sans.pose==='serious')drawSansSerious(px-dodgeOffset*0.6,py+breathe,isBlink);
    else if(sans.pose==='tired')drawSansTired(px-dodgeOffset*0.6,py+breathe,isBlink);
    ctx.restore();
    // 本体
    if(sans.pose==='idle')drawSansIdle(px+dodgeOffset,py+breathe,isBlink);
    else if(sans.pose==='shrug')drawSansShrug(px+dodgeOffset,py+breathe,isBlink);

// ============================================================
let soulTrail=[];
function drawSoul(sx,sy,mode,inv){
  // 拖尾
  if(state===ST.BRED||state===ST.BBLUE){
    soulTrail.push({x:sx,y:sy,mode:mode,life:8});
    if(soulTrail.length>6)soulTrail.shift();
  }
  soulTrail.forEach((t,i)=>{
    t.life--;
    const a=(t.life/8)*0.35;
    ctx.globalAlpha=a;
    drawSingleSoul(t.x,t.y,t.mode,false);
  });
  ctx.globalAlpha=1;
  soulTrail=soulTrail.filter(t=>t.life>0);
  
  if(inv>0&&Math.floor(inv/3)%2===0)return;
  drawSingleSoul(sx,sy,mode,true);
}

function drawSingleSoul(sx,sy,mode,highlight){
  ctx.save();ctx.translate(sx,sy);
  if(mode==='red')ctx.fillStyle=C.RED;
  else if(mode==='blue')ctx.fillStyle=C.BLUE;
  else if(mode==='green')ctx.fillStyle=C.GREEN;
  // 像素爱心（经典UNDERTALE风格，逐像素绘制）
  const heartPixels=[
    '....##....##....',
    '...####..####...',
    '..############..',
    '..############..',
    '..############..',
    '...##########...',
    '....########....',
    '.....######.....',
    '......####......',
    '.......##.......'
  ];
  const scale=1;
  const offX=-8,offY=-7;
  heartPixels.forEach((row,dy)=>{
    for(let dx=0;dx<row.length;dx++){
      if(row[dx]==='#'){
        ctx.fillRect(offX+dx*scale,offY+dy*scale,scale,scale);
      }
    }
  });
  if(highlight){
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.fillRect(-4,-5,3,3);ctx.fillRect(-1,-6,2,2);
  }
  ctx.restore();
}

function spawnParticle(px,py,vx,vy,life,col,size,type){
  particles.push({x:px,y:py,vx:vx,vy:vy,life:life,maxLife:life,col:col,size:size||2,type:type||'normal'});
}

function spawnHitParticles(px,py){
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2;
    const sp=1+Math.random()*4;
    spawnParticle(px,py,Math.cos(a)*sp,Math.sin(a)*sp,20+Math.random()*20,C.WHITE,2+Math.random()*3,'spark');
  }
  for(let i=0;i<6;i++){
    const a=Math.random()*Math.PI*2;
    spawnParticle(px,py,Math.cos(a)*2,Math.sin(a)*2,30,C.PURPLE,2,'karma');
  }
}

function spawnSoulBreak(){
  soulBreakParticles=[];
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2;
    const sp=0.5+Math.random()*3;
    soulBreakParticles.push({
      x:soul.x,y:soul.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:60+Math.random()*40,size:2+Math.random()*4,col:Math.random()>0.5?C.RED:C.WHITE
    });
  }
}

function spawnBlasterParticles(bx,by,angle){
  const cx=bx-Math.cos(angle)*40,cy=by-Math.sin(angle)*40;
  for(let i=0;i<3;i++){
    const a=angle+(Math.random()-0.5)*0.5;
    spawnParticle(cx,cy,Math.cos(a)*3,Math.sin(a)*3,15,C.WHITE,2,'trail');
  }
}

function updateParticles(){
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.type==='spark'){p.vx*=0.9;p.vy*=0.9;}
    if(p.type==='karma'){p.vy+=0.1;}
    p.life--;
  });
  particles=particles.filter(p=>p.life>0);
  soulBreakParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;});
  soulBreakParticles=soulBreakParticles.filter(p=>p.life>0);
}

function drawParticles(){
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    ctx.globalAlpha=a;
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  });
  ctx.globalAlpha=1;
  soulBreakParticles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life/60);
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  });
  ctx.globalAlpha=1;
}

// 战斗框系统（带弹性物理）
// ============================================================
function updateBox(){
  // 弹簧物理
  const k=0.12,damp=0.75;
  const ax=(box.tx-box.x)*k;
  const ay=(box.ty-box.y)*k;
  const aw=(box.tw-box.w)*k;
  const ah=(box.th-box.h)*k;
  box.velX=(box.velX+ax)*damp;
  box.velY=(box.velY+ay)*damp;
  box.velW=(box.velW+aw)*damp;
  box.velH=(box.velH+ah)*damp;
  box.x+=box.velX;
  box.y+=box.velY;
  box.w+=box.velW;
  box.h+=box.velH;
}

function drawBox(){
  ctx.strokeStyle=C.WHITE;
  ctx.lineWidth=5;
  if(box.split){
    const gap=box.splitGap;
    ctx.strokeRect(box.x-box.w/2,box.y-box.h/2-gap,box.w,box.h/2);
    ctx.strokeRect(box.x-box.w/2,box.y+gap,box.w,box.h/2);
  }else{
    ctx.strokeRect(box.x-box.w/2,box.y-box.h/2,box.w,box.h);
  }
  ctx.lineWidth=1;
}

// 骨头绘制（精确还原）

function drawBone(b){
  ctx.fillStyle=b.c==='blue'?C.BLUE:C.WHITE;
  if(b.dir==='down'||b.dir==='up'){
    ctx.fillRect(b.x-4,b.y,b.w,b.h);
    ctx.beginPath();ctx.arc(b.x,b.y,5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(b.x,b.y+b.h,5,0,Math.PI*2);ctx.fill();
  }else{
    ctx.fillRect(b.x,b.y-4,b.w,b.h);
    ctx.beginPath();ctx.arc(b.x,b.y,5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(b.x+b.w,b.y,5,0,Math.PI*2);ctx.fill();
  }
  // 骨头纹理线
  ctx.fillStyle=b.c==='blue'?C.DBLUE:C.GRAY;
  if(b.dir==='down'||b.dir==='up'){
    ctx.fillRect(b.x-1,b.y+8,2,b.h-16);
  }else{
    ctx.fillRect(b.x+8,b.y-1,b.w-16,2);
  }
}

function drawBlaster(b){
  ctx.save();
  ctx.translate(b.x,b.y);
  ctx.rotate(b.angle);
  ctx.globalAlpha=b.alpha;
  const sc=b.scale||1;
  ctx.scale(sc,sc);
  
  // 使用像素精灵绘制龙骨炮（b.x,b.y = 嘴部位置，精灵向上偏移107像素）
  const MOUTH_Y=107;
  ctx.fillStyle=C.WHITE;
  BLASTER_PIXELS.forEach((row,y)=>{
    row.forEach(seg=>{
      ctx.fillRect(seg[0],y-MOUTH_Y,seg[1]-seg[0]+1,1);
    });
  });
  
  // 光束（从炮嘴向前射出，中心对准嘴部）
  if(b.firing){
    const bl=b.beamLen||350;
    ctx.fillStyle=C.WHITE;
    ctx.fillRect(0,-16,bl,32);
    // 多层光晕
    ctx.globalAlpha=b.alpha*0.3;
    ctx.fillRect(0,-24,bl,48);
    ctx.globalAlpha=b.alpha*0.12;
    ctx.fillRect(0,-36,bl,72);
    ctx.globalAlpha=b.alpha*0.05;
    ctx.fillRect(0,-48,bl,96);
    ctx.globalAlpha=b.alpha;
    if(frame%2===0)spawnBlasterParticles(b.x,b.y,b.angle);
  }
  
  ctx.restore();
}

function drawDialog(){
  if(!dialog.show)return;
  
  if(dialog.side==='right'){
    // Sans旁边小对话框
    ctx.fillStyle=C.BLACK;
    ctx.strokeStyle=C.WHITE;
    ctx.lineWidth=3;
    const dx=390,dy=60,dw=210,dh=85;
    ctx.fillRect(dx,dy,dw,dh);
    ctx.strokeRect(dx,dy,dw,dh);
    // 三角指向Sans
    ctx.fillStyle=C.WHITE;
    ctx.beginPath();ctx.moveTo(dx,dy+28);ctx.lineTo(dx-12,dy+42);ctx.lineTo(dx,dy+56);ctx.fill();
    // 文字
    ctx.fillStyle=C.WHITE;
    ctx.font='bold 15px "Courier New",SimSun,monospace';
    dialog.text.split('\n').forEach((line,i)=>ctx.fillText(line,dx+12,dy+18+i*22));
  }else{
    // 顶部大对话框
    ctx.fillStyle=C.BLACK;
    ctx.strokeStyle=C.WHITE;
    ctx.lineWidth=4;
    const dx=35,dy=12,dw=570,dh=118;
    ctx.fillRect(dx,dy,dw,dh);
    ctx.strokeRect(dx,dy,dw,dh);
    
    if(dialog.hasFace){
      // Sans头像
      ctx.fillStyle=C.WHITE;
      ctx.fillRect(dx+12,dy+14,68,68);
      ctx.fillStyle=C.BLACK;
      ctx.fillRect(dx+22,dy+28,14,16);ctx.fillRect(dx+48,dy+28,14,16);
      if(sans.eye==='left'){ctx.fillStyle=C.YELLOW;ctx.fillRect(dx+46,dy+26,12,14);}
      ctx.fillStyle=C.BLACK;
      ctx.fillRect(dx+40,dy+50,8,5);
      ctx.fillRect(dx+32,dy+56,24,2);
    }
    
    // 文字
    ctx.fillStyle=C.WHITE;
    ctx.font='bold 18px "Courier New",SimSun,monospace';
    const tx=dialog.hasFace?dx+92:dx+22;
    dialog.text.split('\n').forEach((line,i)=>ctx.fillText(line,tx,dy+24+i*26));
    
    // 底部闪烁三角（按继续提示）
    if(dialog.idx>=dialog.full.length){
      dialog.arrowTimer++;
      if(Math.floor(dialog.arrowTimer/30)%2===0){
        ctx.fillStyle=C.WHITE;
        ctx.beginPath();ctx.moveTo(dx+dw-30,dy+dh-20);ctx.lineTo(dx+dw-20,dy+dh-10);ctx.lineTo(dx+dw-30,dy+dh);ctx.fill();
      }
    }
  }
}

  ctx.fillStyle='#ffe8a0';
  ctx.fillRect(x,90,78,78);
  // 窗框（十字形）
  ctx.fillStyle='#d08040';
  ctx.fillRect(x+36,90,6,78);
  ctx.fillRect(x,126,78,6);
  // 菱形装饰
  ctx.fillStyle='#d08040';
  ctx.fillRect(x+18,108,6,6);
  ctx.fillRect(x+54,108,6,6);
  ctx.fillRect(x+18,144,6,6);
  ctx.fillRect(x+54,144,6,6);
  // 窗户顶部拱形
  ctx.fillStyle='#d08040';
  ctx.fillRect(x+10,80,58,10);
  ctx.fillRect(x+20,72,38,8);
}

// 绘制Frisk剪影
function drawFrisk(px,py){
  ctx.fillStyle=C.BLACK;
  // 头
  ctx.fillRect(px-7,py-22,14,14);
  ctx.fillRect(px-9,py-20,2,8);ctx.fillRect(px+7,py-20,2,8);
  // 身体
  ctx.fillRect(px-8,py-8,16,14);
  // 条纹衫（经典Frisk特征）
  ctx.fillStyle='#202020';
  ctx.fillRect(px-8,py-6,16,2);
  ctx.fillRect(px-8,py-2,16,2);
  ctx.fillRect(px-8,py+2,16,2);
  ctx.fillStyle=C.BLACK;
  // 腿
  ctx.fillRect(px-7,py+6,6,12);
  ctx.fillRect(px+1,py+6,6,12);
  // 脚/鞋
  ctx.fillRect(px-8,py+16,8,4);
  ctx.fillRect(px,py+16,8,4);
  // 手臂
  ctx.fillRect(px-11,py-4,3,12);
  ctx.fillRect(px+8,py-4,3,12);
}

// ============================================================
// 攻击更新与碰撞
// ============================================================
function updateAttacks(){
  attacks.forEach(a=>{
    if(a.type==='bone'){
      if(a.dir==='down')a.y+=a.speed;
      else if(a.dir==='up')a.y-=a.speed;
      else if(a.dir==='left')a.x-=a.speed;
      else if(a.dir==='right')a.x+=a.speed;
    }else if(a.type==='blaster'){
      a.timer++;
      if(a.timer<30){a.angle+=a.spin;a.scale=Math.min(1,a.scale+0.05);}
      else if(a.timer<40){a.scale=1;}
      else if(a.timer<100){
        if(!a.firing){playSFX('blaster');}
        a.firing=true;
      }
      else{a.firing=false;a.alpha-=0.03;}
    }else if(a.type==='wall'){
      if(a.dir==='right')a.x+=a.speed;
      else if(a.dir==='left')a.x-=a.speed;
    }
  });
  attacks=attacks.filter(a=>{
    if(a.type==='bone')return a.y>-80&&a.y<H+80&&a.x>-80&&a.x<W+80;
    if(a.type==='blaster')return a.alpha>0;
    if(a.type==='wall')return a.x>-200&&a.x<W+200;
    return true;
  });
}

function checkHits(){
  if(soul.inv>0)return;
  const sr=7;
  attacks.forEach(a=>{
    if(a.type==='bone'){
      let rx,ry,rw,rh;
      if(a.dir==='down'||a.dir==='up'){rx=a.x-5;ry=a.y;rw=10;rh=a.h;}
      else{rx=a.x;ry=a.y-5;rw=a.w;rh=10;}
      if(soul.x+sr>rx&&soul.x-sr<rx+rw&&soul.y+sr>ry&&soul.y-sr<ry+rh){
        if(a.color==='blue'&&(keys['arrowleft']||keys['arrowright']||keys['arrowup']||keys['arrowdown'])){
          // 蓝骨：移动时不受伤
        }else{
          takeDamage(a.damage||5);
        }
      }
    }else if(a.type==='blaster'&&a.firing){
      // 龙骨炮光束碰撞（线段到点距离，从炮嘴向前）
      const rad=a.angle;
      const len=a.beamLen||350;
      const x1=a.x,y1=a.y;
      const x2=a.x+Math.cos(rad)*len,y2=a.y+Math.sin(rad)*len;
      const d=pointToLineDist(soul.x,soul.y,x1,y1,x2,y2);
      if(d<16&&isBetween(soul.x,x1,x2,20)&&isBetween(soul.y,y1,y2,20)){
        takeDamage(3);
      }
    }else if(a.type==='wall'){
      if(soul.x+sr>a.x&&soul.x-sr<a.x+a.w&&soul.y+sr>a.y&&soul.y-sr<a.y+a.h){
        takeDamage(5);
      }
    }
  });
}

function pointToLineDist(px,py,x1,y1,x2,y2){
  const A=px-x1,B=py-y1,C=x2-x1,D=y2-y1;
  const dot=A*C+B*D,lenSq=C*C+D*D;
  let param=lenSq!==0?dot/lenSq:-1;
  let xx,yy;
  if(param<0){xx=x1;yy=y1;}
  else if(param>1){xx=x2;yy=y2;}
  else{xx=x1+param*C;yy=y1+param*D;}
  const dx=px-xx,dy=py-yy;
  return Math.sqrt(dx*dx+dy*dy);
}
function isBetween(v,a,b,tol){return v>=Math.min(a,b)-tol&&v<=Math.max(a,b)+tol;}

function takeDamage(dmg){
  if(soul.inv>0)return;
  soul.inv=45;
  karma=Math.min(karma+6,maxHp);
  playSFX('hit');
  hp=Math.max(1,hp-dmg);
  screenShake.intensity=12;
  spawnHitParticles(soul.x,soul.y);
  // 灵魂碎裂粒子
  for(let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2;
    spawnParticle(soul.x,soul.y,Math.cos(a)*2,Math.sin(a)*2,25,C.RED,3,'soul');
  }
}

function updateKarma(){
  if(karma>0&&frame%5===0){
    karma--;
    hp=Math.max(1,hp-1);
    // KARMA紫色粒子
    if(frame%10===0){
      spawnParticle(216+hp+karma,415+Math.random()*18,0,-0.5,20,C.PURPLE,2,'karma');
    }
  }
  if(hp<=1&&karma<=0){
    state=ST.DEAD;
    if(battleStarted&&survivalTime>bestTime){
      bestTime=survivalTime;
      localStorage.setItem('sans_best_time',bestTime.toFixed(2));
    }
    spawnSoulBreak();
    deadTimer=0;
  }
}

// 灵魂更新
// ============================================================
function updateSoul(){
  const speed=3.5;
  if(soul.mode==='red'){
    if(keys['arrowleft'])soul.x-=speed;
    if(keys['arrowright'])soul.x+=speed;
    if(keys['arrowup'])soul.y-=speed;
    if(keys['arrowdown'])soul.y+=speed;
  }else if(soul.mode==='blue'){
    if(keys['arrowleft'])soul.x-=speed;
    if(keys['arrowright'])soul.x+=speed;
    soul.vy+=0.45;
    if(keys['arrowup']&&soul.ground)soul.vy=-8.5;
    soul.y+=soul.vy;
  }else if(soul.mode==='green'){
    // 绿心：不能移动，按住方向键产生护盾
    if(keys['arrowleft'])soul.x-=speed;
    if(keys['arrowright'])soul.x+=speed;
    if(keys['arrowup'])soul.y-=speed;
    if(keys['arrowdown'])soul.y+=speed;
  }
  
  // 边界限制
  const bxx=box.x-box.w/2,byy=box.y-box.h/2;
  soul.x=Math.max(bxx+10,Math.min(bxx+box.w-10,soul.x));
  
  if(soul.mode==='red'||soul.mode==='green'){
    soul.y=Math.max(byy+10,Math.min(byy+box.h-10,soul.y));
  }else{
    if(soul.y>byy+box.h-10){soul.y=byy+box.h-10;soul.vy=0;soul.ground=true;}
    else if(soul.y<byy+10){soul.y=byy+10;soul.vy=0;soul.ground=false;}
    else{soul.ground=false;}
    // 平台碰撞
    platforms.forEach(p=>{
      if(soul.x>p.x&&soul.x<p.x+p.w&&soul.y+8>p.y&&soul.y+8<p.y+10&&soul.vy>=0){
        soul.y=p.y-8;soul.vy=0;soul.ground=true;
      }
    });
  }
  if(soul.inv>0)soul.inv--;
}

      }
      // 底部上升骨刺
      for(let i=0;i<6;i++){
        attacks.push({type:'bone',x:cx-cw/2+15+i*45,y:cy+ch/2+20,w:6,h:35,dir:'up',speed:3,color:'white',damage:5});
      }
      break;
    case 21: // 【截图6】终极环绕龙骨炮
      box.tw=200;box.th=180;box.tx=320;box.ty=310;
      soul.mode='red';hasBlaster=true;
      const blasterCount=12;
      const radius=200;
      for(let i=0;i<blasterCount;i++){
        const angle=(i/blasterCount)*Math.PI*2;
        const bx=cx+Math.cos(angle)*radius;
        const by=cy+Math.sin(angle)*radius;
        const aimAngle=Math.atan2(cy-by,cx-bx);
        attacks.push({type:'blaster',x:bx,y:by,angle:aimAngle,spin:0,timer:i*5,firing:false,beamLen:radius+50,alpha:1,scale:0,damage:3});
      }
      break;
    case 22: // 【截图】上下骨刺栅栏
      box.tw=260;box.th=160;box.tx=320;box.ty=310;
      soul.mode='blue';soul.vy=0;
      // 上排骨刺 - 从框顶向下伸，尖端向下，高度交错
      for(let i=0;i<13;i++){
        const h=28+(i%4)*14;
        attacks.push({type:'bone',x:cx-cw/2+8+i*19,y:cy-ch/2-2,w:5,h:h+2,dir:'down',speed:0,color:'white',damage:5});
      }
      // 下排骨刺 - 从框底向上伸，尖端向上，与上排错位
      for(let i=0;i<13;i++){
        const h=28+((i+2)%4)*14;
        attacks.push({type:'bone',x:cx-cw/2+8+i*19,y:cy+ch/2-h,w:5,h:h+2,dir:'up',speed:0,color:'white',damage:5});
      }
      // 中间加一根蓝骨（制造移动压力）
      attacks.push({type:'bone',x:cx-cw/2+125,y:cy-ch/2-30,w:5,h:40,dir:'down',speed:0,color:'blue',damage:5});
      break;
  }
  if(!hasBlaster&&attacks.length>0&&attacks.some(a=>a.type==='bone'))playSFX('bone');
}

function showDialog(idx){
  if(idx>=DIALOGS.length)return;
  const d=DIALOGS[idx];
  dialog.full=d.text;dialog.text='';dialog.idx=0;dialog.timer=0;
  dialog.show=true;dialog.hasFace=d.hasFace;dialog.side=d.side;
  sans.pose=d.pose;sans.eye=d.eye;sans.dialogIdx=idx+1;
  state=ST.DIALOGUE;
}

// ============================================================
// 主更新
// ============================================================
function update(){
  frame++;
  updateBox();
  updateParticles();
  
  // 屏幕震动
  if(screenShake.intensity>0){
    screenShake.x=(Math.random()-0.5)*screenShake.intensity;
    screenShake.y=(Math.random()-0.5)*screenShake.intensity;
    screenShake.intensity*=screenShake.decay;
    if(screenShake.intensity<0.4)screenShake.intensity=0;
  }else{screenShake.x=screenShake.y=0;}
  
  // Sans眨眼
  sans.blinkTimer++;
  if(sans.blinkTimer>150+(Math.random()*100)){sans.blinkTimer=0;}
  
  if(state===ST.INTRO){
    // 直接跳过开场，进入对话
    state=ST.DIALOGUE;showDialog(0);
  }else if(state===ST.DIALOGUE){
    dialog.timer++;
    if(dialog.timer>2&&dialog.idx<dialog.full.length){
      dialog.idx++;
      dialog.text=dialog.full.slice(0,dialog.idx).replace(/\\n/g,'\n');
      dialog.timer=0;
      if(dialog.idx%2===0)playSFX('type');
    }
    // 对话框内Sans的眨眼
    if(dialog.idx<dialog.full.length&&frame%3===0){
      sans.blinkTimer++;
    }
  }else if(state===ST.BRED||state===ST.BBLUE||state===ST.BGREEN){
    if(battleStarted){survivalTime=(Date.now()-battleStartTime)/1000;}
    updateSoul();updateAttacks();checkHits();updateKarma();
    waveTime++;
    if(waveTime%140===0)spawnWave(turn++);
    if(waveTime>850){
      waveTime=0;attacks=[];platforms=[];box.split=false;
      if(sans.dialogIdx<DIALOGS.length){
        showDialog(sans.dialogIdx);
      }else{
        state=ST.MENU;soul.x=box.x;soul.y=box.y;menuIdx=0;box.tw=200;box.th=180;box.tx=320;box.ty=310;
      }
    }
  }else if(state===ST.ATTACK){
    attackBar.pos+=attackBar.dir*attackBar.speed;
    if(attackBar.pos>270||attackBar.pos<0)attackBar.dir*=-1;
  }else if(state===ST.DEAD){
    deadTimer++;
    if(deadTimer>180&&(keys['z']||keys['enter']||keys[' ']))location.reload();
  }else if(state===ST.ENDING){
    endingTimer++;
    // Sans逐渐淡出
    if(endingTimer>60&&endingTimer<180){
      sans.alpha=Math.max(0,1-(endingTimer-60)/120);
    }
    // 伤害数字飘动
    if(damageNumber){
      damageNumber.y+=damageNumber.dy;
      damageNumber.life--;
      if(damageNumber.life<=0)damageNumber=null;
    }
    // 按Z重新开始
    if(endingTimer>300&&(keys['z']||keys['enter']||keys[' ']))location.reload();
  }
  
  if(missTimer>0){missTimer--;if(missTimer===0)showMiss=false;}
  if(dodgeTimer>0){dodgeTimer--;if(dodgeTimer===0)showDodge=false;}
}

// ============================================================
// 主绘制
// ============================================================
function draw(){
  ctx.save();
  ctx.translate(screenShake.x,screenShake.y);
  ctx.fillStyle=C.BLACK;ctx.fillRect(0,0,W,H);
  
  if(state===ST.INTRO){
    ctx.fillStyle=C.BLACK;ctx.fillRect(0,0,W,H);
    drawSans(270,50);
  }else{
    if(state!==ST.DEAD){
      ctx.save();
      ctx.globalAlpha=sans.alpha;
      drawSans(270,50);
      ctx.restore();
    }
    
    if(state===ST.BRED||state===ST.BBLUE||state===ST.BGREEN){
      drawBox();
      attacks.forEach(a=>{
        if(a.type==='bone')drawBone(a);
        else if(a.type==='blaster')drawBlaster(a);
        else if(a.type==='wall'){ctx.fillStyle=C.WHITE;ctx.fillRect(a.x,a.y,a.w,a.h);}
      });
      platforms.forEach(drawPlatform);
      drawSoul(soul.x,soul.y,soul.mode,soul.inv);
      // 特定回合在Sans周围显示龙骨炮头
      if(turn>=17&&turn<=19&&frame%60<45){
        const orbitAngle=frame*0.03;
        const orbitR=55;
        ctx.save();
        ctx.translate(270,50);
        ctx.fillStyle=C.WHITE;
        // 左侧小龙头
        ctx.save();ctx.translate(-orbitR,Math.sin(orbitAngle)*10);ctx.scale(0.4,0.4);
        BLASTER_PIXELS.forEach((row,y)=>{row.forEach(seg=>{ctx.fillRect(seg[0],y-107,seg[1]-seg[0]+1,1);});});
        ctx.restore();
        // 右侧小龙头
        ctx.save();ctx.translate(orbitR,Math.sin(orbitAngle+Math.PI)*10);ctx.scale(-0.4,0.4);
        BLASTER_PIXELS.forEach((row,y)=>{row.forEach(seg=>{ctx.fillRect(seg[0],y-107,seg[1]-seg[0]+1,1);});});
        ctx.restore();
        ctx.restore();
      }
    }else if(state===ST.MENU||state===ST.ATTACK||state===ST.ITEMS||state===ST.ACT||state===ST.SPARE){
      drawBox();
      if(state===ST.MENU){
        ctx.fillStyle=C.WHITE;
        ctx.font='bold 16px "Courier New",SimSun,monospace';
        ctx.fillText('* Sans',box.x-box.w/2+15,box.y-box.h/2+25);
        drawSoul(soul.x,soul.y,'red',0);
      }else if(state===ST.ATTACK){
        // 使用1:1截图绘制攻击条
        if(ATTACK_BAR_IMG.complete && ATTACK_BAR_IMG.naturalWidth>0){
          const ax=box.x-ATTACK_BAR_IMG.width/2;
          const ay=box.y-ATTACK_BAR_IMG.height/2;
          ctx.drawImage(ATTACK_BAR_IMG,ax,ay);
          // 绘制滑块位置（根据attackBar.pos）
          ctx.fillStyle=C.WHITE;
          const sliderX=ax+30+attackBar.pos;
          ctx.fillRect(sliderX,ay+60,8,30);
        }else{
          ctx.fillStyle=C.WHITE;
          ctx.fillRect(box.x-box.w/2+10,box.y-10,box.w-20,20);
          ctx.fillStyle=C.RED;
          ctx.fillRect(box.x-box.w/2+10+attackBar.pos,box.y-10,10,20);
        }
      }else if(state===ST.ITEMS){
        ctx.fillStyle=C.WHITE;ctx.font='bold 16px "Courier New",SimSun,monospace';
        ['* 奶油糖肉桂派','* 雪人碎片','* 海茶'].forEach((t,i)=>ctx.fillText(t,box.x-box.w/2+25,box.y-box.h/2+25+i*25));
        ctx.fillStyle=C.YELLOW;ctx.fillText('>',box.x-box.w/2+8,box.y-box.h/2+25+selectedItem*25);
      }else if(state===ST.ACT){
        ctx.fillStyle=C.WHITE;ctx.font='bold 16px "Courier New",SimSun,monospace';
        ['* 查看','* 交谈'].forEach((t,i)=>ctx.fillText(t,box.x-box.w/2+25,box.y-box.h/2+25+i*25));
        ctx.fillStyle=C.YELLOW;ctx.fillText('>',box.x-box.w/2+8,box.y-box.h/2+25+actIdx*25);
      }else if(state===ST.SPARE){
        ctx.fillStyle=C.WHITE;ctx.font='bold 16px "Courier New",SimSun,monospace';
        ctx.fillText('* 饶恕',box.x-box.w/2+25,box.y-box.h/2+25);
        ctx.fillStyle=C.YELLOW;ctx.fillText('>',box.x-box.w/2+8,box.y-box.h/2+25);
      }
    }
    
    if(state!==ST.DEAD&&state!==ST.ENDING)drawUI();
    if(showMiss){
      ctx.fillStyle=C.WHITE;ctx.font='bold 42px "Courier New",monospace';
      ctx.fillText('MISS',W/2-55,H/2-35);
    }
    if(showDodge){
      ctx.fillStyle=C.YELLOW;ctx.font='bold 42px "Courier New",monospace';
      ctx.fillText('DODGE',W/2-75,H/2-35);
    }
    drawDialog();
    drawParticles();
    
    if(state===ST.DEAD){
      drawParticles();
      soulBreakParticles.forEach(p=>{
        ctx.globalAlpha=Math.max(0,p.life/80);
        ctx.fillStyle=p.col;
        ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
      });
      ctx.globalAlpha=1;
      ctx.fillStyle=C.RED;ctx.font='bold 22px "Courier New",SimSun,monospace';
      ctx.fillText('你丧失了决心...',W/2-95,H/2-25);
      if(deadTimer>120){
        ctx.fillStyle=C.WHITE;ctx.font='14px "Courier New",SimSun,monospace';
        ctx.fillText('按 Z 或 Enter 重新开始',W/2-95,H/2+20);
      }
    }else if(state===ST.ENDING){
      // 伤害数字
      if(damageNumber&&damageNumber.life>0){
        ctx.globalAlpha=Math.min(1,damageNumber.life/30);
        ctx.fillStyle=C.WHITE;ctx.font='bold 32px "Courier New",monospace';
        ctx.fillText(damageNumber.val,damageNumber.x-25,damageNumber.y);
        ctx.globalAlpha=1;
      }
      // Sans逐渐消失后显示结局文字
      if(endingTimer>120){
        ctx.fillStyle=C.WHITE;ctx.font='bold 22px "Courier New",SimSun,monospace';
        if(sansDefeated){
          ctx.fillText('Sans被击败了...',W/2-95,H/2-25);
          if(endingTimer>180){
            ctx.font='14px "Courier New",SimSun,monospace';
            ctx.fillText('他瘫倒在地，化为尘埃。',W/2-110,H/2+10);
          }
        }
        if(endingTimer>300){
          ctx.fillStyle=C.WHITE;ctx.font='14px "Courier New",SimSun,monospace';
          ctx.fillText('按 Z 或 Enter 重新开始',W/2-95,H/2+50);
        }
      }
    }
  }
  ctx.restore();
}

// ============================================================
// 输入处理
// ============================================================
onKeyPress=function(k){
  if(state===ST.DIALOGUE){
    if(dialog.idx<dialog.full.length){
      dialog.idx=dialog.full.length;
      dialog.text=dialog.full.replace(/\\n/g,'\n');
    }else{
      dialog.show=false;
      state=ST.MENU;
      soul.x=box.x;soul.y=box.y;menuIdx=0;
    }
  }else if(state===ST.MENU){
    if(k==='arrowleft')menuIdx=(menuIdx+3)%4;
    if(k==='arrowright')menuIdx=(menuIdx+1)%4;
    if(k==='z'||k==='enter'||k===' '){
      if(menuIdx===0){state=ST.ATTACK;attackBar.pos=0;attackBar.dir=1;}
      else if(menuIdx===1){state=ST.ACT;actIdx=0;}
      else if(menuIdx===2){state=ST.ITEMS;selectedItem=0;}
      else if(menuIdx===3){state=ST.SPARE;spareIdx=0;}
    }
  }else if(state===ST.ATTACK){
    if(k==='z'||k==='enter'||k===' '){
      // 攻击条伤害判定
      const hitCenter=135; // 目标中心
      const dist=Math.abs(attackBar.pos-hitCenter);
      if(dist<35){
        // 命中判定通过，但Sans有80%概率闪避
        if(Math.random()<0.8){
          // 闪避！
          showDodge=true;dodgeTimer=60;
          // 闪避粒子
          for(let i=0;i<12;i++){
            const a=Math.random()*Math.PI*2;
            const sp=1+Math.random()*3;
            spawnParticle(box.x-40,box.y-10,Math.cos(a)*sp,Math.sin(a)*sp,25,C.WHITE,2,'spark');
          }
        }else{
          // 真正命中！Sans原版只有1 HP，一击必杀
          const dmg=9999;
          sansHp=Math.max(0,sansHp-dmg);
          damageNumber={val:dmg,x:box.x,y:box.y-30,life:90,dy:-2};
          // 打击粒子
          for(let i=0;i<20;i++){
            const a=Math.random()*Math.PI*2;
            const sp=2+Math.random()*5;
            spawnParticle(box.x,box.y-20,Math.cos(a)*sp,Math.sin(a)*sp,30+Math.random()*20,C.WHITE,3+Math.random()*3,'spark');
          }
          if(sansHp<=0){
            // Sans被击败，进入结局
            sansDefeated=true;
            state=ST.ENDING;
            endingTimer=0;
            return;
          }
        }
      }else{
        showMiss=true;missTimer=60;
      }
      // 根据回合数决定灵魂颜色
      const waveType=turn%23;
      if(waveType===2||waveType===6||waveType===10||waveType===16||waveType===20){
        state=ST.BBLUE;
      }else{
        state=ST.BRED;
      }
      if(!battleStarted){battleStarted=true;battleStartTime=Date.now();}
      waveTime=0;
      soul.x=box.x;soul.y=box.y;
      if(state===ST.BBLUE){soul.mode='blue';soul.vy=0;}
      else{soul.mode='red';}
      box.tw=200;box.th=180;box.tx=320;box.ty=310;box.split=false;
      attacks=[];platforms=[];
    }
  }else if(state===ST.ITEMS){
    if(k==='arrowup')selectedItem=Math.max(0,selectedItem-1);
    if(k==='arrowdown')selectedItem=Math.min(2,selectedItem+1);
    if(k==='z'||k==='enter'||k===' '){
      hp=Math.min(maxHp,hp+[20,15,18][selectedItem]);
      const waveType=turn%22;
      if(waveType===2||waveType===6||waveType===10||waveType===16||waveType===20){
        state=ST.BBLUE;soul.mode='blue';soul.vy=0;
      }else{
        state=ST.BRED;soul.mode='red';
      }
      if(!battleStarted){battleStarted=true;battleStartTime=Date.now();}
      waveTime=0;
      soul.x=box.x;soul.y=box.y;
    }
    if(k==='x'||k==='shift')state=ST.MENU;
  }else if(state===ST.ACT){
    if(k==='arrowup')actIdx=Math.max(0,actIdx-1);
    if(k==='arrowdown')actIdx=Math.min(1,actIdx+1);
    if(k==='z'||k==='enter'||k===' '){
      state=ST.DIALOGUE;
      dialog.show=true;dialog.hasFace=false;dialog.side='none';
      dialog.idx=0;dialog.timer=0;
      dialog.full=actIdx===0?'* Sans - 攻击1 防御1\\n  最弱的敌人。\\n  但是也要注意了。':'* 你试着跟Sans说话...\\n  但是他对你的\\n  行动没有反应。';
      dialog.text='';
    }
    if(k==='x'||k==='shift')state=ST.MENU;
  }else if(state===ST.SPARE){
    if(k==='z'||k==='enter'||k===' '){
      state=ST.DIALOGUE;
      dialog.show=true;dialog.hasFace=false;dialog.side='none';
      dialog.idx=0;dialog.timer=0;
      dialog.full='* Sans正在躲避你的\\n  饶恕。';dialog.text='';
    }
    if(k==='x'||k==='shift')state=ST.MENU;
  }
};

// ============================================================
// 游戏循环
// ============================================================
function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
