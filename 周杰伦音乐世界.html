let currentFilter='all';
let searchKeyword='';

function renderSidebar(){
  const nav=document.getElementById('album-nav');
  nav.innerHTML=albums.map(a=>`<button class="album-nav-item" onclick="scrollToAlbum('${a.id}')" id="nav-${a.id}">${a.emoji} ${a.name}<span class="album-year">${a.year}</span></button>`).join('');
}

function renderSongs(){
  const grid=document.getElementById('song-grid');
  let html='';
  let totalVisible=0;
  albums.forEach(album=>{
    const filtered=album.songs.filter(song=>{
      const passFilter=currentFilter==='all'||song.tags.includes(currentFilter);
      const passSearch=!searchKeyword||song.title.toLowerCase().includes(searchKeyword)||song.lyrics.toLowerCase().includes(searchKeyword);
      return passFilter&&passSearch;
    });
    if(filtered.length===0)return;
    totalVisible+=filtered.length;
    html+=`<div class="album-section" id="${album.id}"><div class="album-header"><div class="album-cover-placeholder" style="background:${album.color}22; color:${album.color}">${album.emoji}</div><div class="album-info"><h2>${album.name}</h2><p>${album.year}年 · ${album.desc}</p></div><div class="song-count-badge">${filtered.length} 首</div></div></div>`;
    filtered.forEach((song,idx)=>{
      const tagsHtml=song.tags.map(t=>`<span class="tag tag-${t}">${getTagLabel(t)}</span>`).join('');
      const realIdx=album.songs.indexOf(song);
      html+=`<div class="song-card" onclick="openLyrics('${album.id}',${realIdx})"><div class="song-num"># ${String(realIdx+1).padStart(2,'0')}</div><div class="song-title">${song.title}</div><div class="song-album-name">${album.name} · ${album.year}</div><div class="song-tags">${tagsHtml}</div></div>`;
    });
  });
  if(totalVisible===0){
    html+=`<div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:#aaa;"><div style="font-size:64px;margin-bottom:16px">🎵</div><p style="font-size:18px">没有找到匹配的歌曲</p></div>`;
  }
  grid.innerHTML=html;
}

function getTagLabel(tag){
  const map={pop:'流行',rap:'R&B说唱',ballad:'情歌',china:'中国风',rock:'摇滚',rband:'节奏蓝调',folk:'民谣',classical:'古典融合',classic:'⭐经典'};
  return map[tag]||tag;
}

function openLyrics(albumId,songIdx){
  const album=albums.find(a=>a.id===albumId);
  if(!album)return;
  const song=album.songs[songIdx];
  if(!song)return;
  document.getElementById('modal-title').textContent=song.title;
  document.getElementById('modal-meta').textContent=`${album.name} · ${album.year}年`;
  document.getElementById('modal-tags').innerHTML=song.tags.map(t=>`<span class="tag tag-${t}">${getTagLabel(t)}</span>`).join('');
  document.getElementById('modal-lyrics-text').innerHTML=escHtml(song.lyrics);
  document.getElementById('lyrics-modal').classList.add('show');
  document.body.style.overflow='hidden';
}

function closeLyrics(){
  document.getElementById('lyrics-modal').classList.remove('show');
  document.body.style.overflow='';
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.getElementById('filter-row').addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');
  if(!btn)return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter=btn.dataset.filter;
  renderSongs();
});

document.getElementById('search-input').addEventListener('input',e=>{
  searchKeyword=e.target.value.trim().toLowerCase();
  renderSongs();
});

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLyrics();});

window.addEventListener('scroll',()=>{
  document.getElementById('back-top').classList.toggle('show',window.scrollY>300);
  albums.forEach(a=>{
    const el=document.getElementById(a.id);
    if(!el)return;
    const rect=el.getBoundingClientRect();
    if(rect.top<=200&&rect.bottom>0){
      document.querySelectorAll('.album-nav-item').forEach(b=>b.classList.remove('active'));
      const nav=document.getElementById('nav-'+a.id);
      if(nav)nav.classList.add('active');
    }
  });
});

function scrollToAlbum(id){
  const el=document.getElementById(id);
  if(el){
    const offset=el.getBoundingClientRect().top+window.scrollY-140;
    window.scrollTo({top:offset,behavior:'smooth'});
  }
  document.querySelectorAll('.album-nav-item').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('nav-'+id);
  if(btn)btn.classList.add('active');
}

renderSidebar();
renderSongs();
const totalSongs=albums.reduce((acc,a)=>acc+a.songs.length,0);
document.getElementById('stat-songs').textContent=totalSongs;
document.getElementById('stat-albums').textContent=albums.length;
</script>
